[pytest]
# Pytest configuration for RedundancyAI

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (may require services)
    e2e: End-to-end tests (require full setup)
    slow: Tests that take significant time
    skip_in_ci: Tests to skip in CI environment

# Coverage options
addopts =
    -v
    --strict-markers
    --tb=short

# Minimum Python version
minversion = 7.0

# Test paths
testpaths = tests

# Ignore patterns
norecursedirs = .git .venv venv __pycache__ *.egg-info

# Output options
console_output_style = progress
